# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=hibernate-ai-demo

# ── H2 database (in-memory for the demo) ─────────────────────────────────────
# Switch to PostgreSQL in production (see commented block below)
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── LangChain4j + Ollama ─────────────────────────────────────────────────────
# Option A - Ollama in Docker (recommended for the demo):
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull qwen2.5:3b
#   The Spring Boot app runs locally with Maven; Ollama runs in Docker.
#   Port 11434 is mapped to localhost, so the URL stays the same.
#
# Option B - Ollama installed locally:
#   ollama pull qwen2.5:3b && ollama serve
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=qwen2.5:3b
langchain4j.ollama.chat-model.temperature=0.0
langchain4j.ollama.chat-model.timeout=120s
langchain4j.ollama.chat-model.log-requests=true
langchain4j.ollama.chat-model.log-responses=true

# ── Alternative: OpenAI (uncomment and disable the Ollama block above) ───────
# Add dependency: langchain4j-open-ai-spring-boot-starter
# langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
# langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
# langchain4j.open-ai.chat-model.temperature=0.0

