spring.application.name=hibernate-assistant-demo

# ── H2 (in-memory for the demo) ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# Hibernate creates the schema, then Spring Boot runs data.sql.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Ollama (native or container; same URL either way) ────────────────────────
# Pull a model first, e.g.:  ollama pull qwen2.5-coder:7b
assistant.ollama.base-url=http://localhost:11434
assistant.ollama.model=qwen2.5-coder:7b
assistant.ollama.timeout-seconds=120
