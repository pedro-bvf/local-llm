spring.application.name=spring-ai-assistant-demo

# ── H2 (in-memory for the demo) ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# Hibernate creates the schema, then Spring Boot runs data.sql.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Spring AI + Ollama (native or container; same URL either way) ────────────
# Pull a model first, e.g.:  ollama pull qwen2.5-coder:7b
# The spring-ai-starter-model-ollama starter auto-configures the ChatModel bean
# from these properties.
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5-coder:7b
spring.ai.ollama.chat.temperature=0.0
# Don't try to pull/verify the model at startup — fail lazily at request time instead,
# so the app boots even when Ollama isn't running (keeps the demo's "is Ollama up?" hint working).
spring.ai.ollama.init.pull-model-strategy=never
